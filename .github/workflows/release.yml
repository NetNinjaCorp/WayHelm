name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            libdbus-1-dev \
            pkg-config \
            build-essential

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Strip binary
        run: strip target/release/wayhelm

      - name: Determine version
        id: ver
        run: |
          # github.ref_name is e.g. "v0.1.0"; we want "0.1.0" too.
          REF="${GITHUB_REF_NAME}"
          echo "tag=${REF}" >> "$GITHUB_OUTPUT"
          echo "ver=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Stage release artifacts
        run: |
          set -eux
          VER="${{ steps.ver.outputs.ver }}"
          mkdir -p dist

          # Source tarball — exact contents tracked by git, with a clean prefix
          # so users can extract and `cd wayhelm-<ver>/`.
          git archive \
            --format=tar.gz \
            --prefix="wayhelm-${VER}/" \
            -o "dist/wayhelm-${VER}.tar.gz" HEAD

          # Pre-built binary bundle for x86_64 Linux. Includes the .desktop
          # file and license so a plain extract+install path works.
          STAGE="stage/wayhelm-${VER}-x86_64-linux"
          mkdir -p "$STAGE"
          cp target/release/wayhelm "$STAGE/"
          cp data/wayhelm.desktop LICENSE Makefile "$STAGE/"
          cp data/io.github.wayhelm.Wayhelm.metainfo.xml "$STAGE/"
          tar -czvf "dist/wayhelm-${VER}-x86_64-linux.tar.gz" -C stage "wayhelm-${VER}-x86_64-linux"

          # Checksums for both
          (cd dist && sha256sum *.tar.gz > sha256sums.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/wayhelm-*.tar.gz
            dist/sha256sums.txt
